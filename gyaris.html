<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antrenör Yarış Kontrol Paneli</title>
    <style>
        :root {
            --arkaplan: #f8fafc; --kart-bg: #ffffff; --bordo: #9f1239; 
            --mavi: #0284c7; --metin-ana: #0f172a; --metin-alt: #64748b; 
            --kenarlik: #e2e8f0; --pembe: #ec4899; --lacivert: #1d4ed8;
            --basari: #10b981; --uyari: #f59e0b;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--arkaplan); color: var(--metin-ana); margin: 0; padding: 20px; }
        .kapsayici { max-width: 1000px; margin: 0 auto; background: var(--kart-bg); border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        
        .baslik-alani { background: var(--bordo); padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .baslik-alani h1 { margin: 0; font-size: 22px; }
        .btn-ana { background: white; color: var(--bordo); text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        
        .sekme-menusu { display: flex; background: var(--kart-bg); border-bottom: 2px solid var(--kenarlik); }
        .sekme-btn { flex: 1; padding: 15px; border: none; background: none; font-size: 16px; font-weight: bold; color: var(--metin-alt); cursor: pointer; transition: 0.3s; }
        .sekme-btn:hover { background: #f0f9ff; color: var(--mavi); }
        .sekme-btn.aktif { color: var(--mavi); border-bottom: 3px solid var(--mavi); background: #f0f9ff; }
        
        .icerik-alani { padding: 20px; }
        .seans-baslik { font-size: 18px; color: var(--metin-ana); margin: 30px 0 15px 0; border-bottom: 2px solid var(--kenarlik); padding-bottom: 5px; }
        .seans-baslik:first-child { margin-top: 0; }
        
        .yaris-kutu { background: #f8fafc; border: 1px solid var(--kenarlik); border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .yaris-baslik { background: var(--mavi); color: white; padding: 10px 15px; font-weight: bold; font-size: 15px; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 10px 15px; color: var(--metin-alt); font-size: 12px; border-bottom: 1px solid var(--kenarlik); }
        td { padding: 10px 15px; border-bottom: 1px solid var(--kenarlik); font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        
        .kiz-rozet { background: #fdf2f8; color: var(--pembe); border: 1px solid #fbcfe8; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 5px; }
        .erkek-rozet { background: #eff6ff; color: var(--lacivert); border: 1px solid #bfdbfe; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-left: 5px; }

        .isim-link { color: var(--metin-ana); text-decoration: none; transition: 0.2s; cursor: pointer; }
        .isim-link:hover { color: var(--mavi); text-decoration: underline; }
        
        .yukleniyor { text-align: center; padding: 40px; color: var(--mavi); font-size: 18px; font-weight: bold; }

        .sonuc-input { padding: 6px; border: 1px solid #cbd5e1; border-radius: 6px; width: 80px; text-align: center; font-size: 13px; outline: none; transition: 0.2s;}
        .sonuc-input:focus { border-color: var(--mavi); box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1); }
        .btn-kaydet { background-color: var(--mavi); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s;}
        .btn-kaydet:hover { filter: brightness(1.1); }

        /* --- MOBİL UYUMLULUK (RESPONSIVE) --- */
        @media (max-width: 768px) {
            .baslik-alani { flex-direction: column; gap: 15px; text-align: center; }
            .sekme-btn { font-size: 14px; padding: 12px; }
            .kapsayici { border-radius: 0; }
            body { padding: 0; }
            
            table thead { display: none; }
            table tbody, table tr, table td { display: block; width: 100%; box-sizing: border-box; }
            table tr { margin-bottom: 15px; border: 1px solid var(--kenarlik); border-radius: 8px; overflow: hidden; background: var(--kart-bg); }
            table td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--kenarlik); text-align: right !important; padding: 10px 15px !important; }
            table td:last-child { border-bottom: none; }
            table td::before { content: attr(data-label); font-weight: bold; color: var(--metin-alt); font-size: 12px; text-align: left; text-transform: uppercase; margin-right: 10px; }
        }
    </style>
</head>
<body>
    <div class="kapsayici">
        <div class="baslik-alani">
            <h1>⏱️ Antrenör Yarış Paneli</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button onclick="startListesiCek()" class="btn-ana" style="background: #eff6ff; color: var(--lacivert); border: 1px solid #bfdbfe; cursor: pointer; padding: 10px 15px;">🚦 Start Listesi Çek</button>
                <button onclick="document.getElementById('pdfInput').click()" class="btn-ana" style="background: white; color: var(--mavi); border: none; cursor: pointer; padding: 10px 15px;">📄 PDF Yükle</button>
                <input type="file" id="pdfInput" accept=".pdf" style="display: none;" onchange="pdfYukle(event)">
                <a href="menu.html" class="btn-ana">Ana Menü</a>
            </div>
        </div>
        
        <div class="sekme-menusu">
            <button class="sekme-btn aktif" onclick="gunDegistir(1)">1. GÜN YARIŞLARI</button>
            <button class="sekme-btn" onclick="gunDegistir(2)">2. GÜN YARIŞLARI</button>
        </div>
        
        <div class="icerik-alani" id="listeAlani">
            <div class="yukleniyor">Veriler ve Sporcu Eşleşmeleri Hazırlanıyor... ⏳</div>
        </div>
    </div>

    <!-- PDF YÜKLEME EKRANI -->
    <div id="pdfYuklemeEkrani" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; backdrop-filter: blur(5px);">
        <div style="font-size: 50px; display: inline-block; animation: donme 1.5s linear infinite;">⏳</div>
        <h2 id="yuklemeBaslik" style="margin-top: 20px; text-align: center;">İşlem Yapılıyor...</h2>
        <p id="yuklemeAciklama" style="color: #cbd5e1; text-align: center; font-size: 14px; max-width: 80%;">Lütfen bekleyin, veriler işleniyor.</p>
        <style>@keyframes donme { 100% { transform: rotate(360deg); } }</style>
    </div>

    <script>
        const API_BASE = "https://trabzon-yuzme-api.onrender.com/api"; // Canlı Sunucu (Render)
        // const API_BASE = "http://127.0.0.1:8000/api"; // Yerel test için
        
        let tumYarislar = [];
        let cinsiyetHaritasi = {};
        let dogumYiliHaritasi = {};
        
        // YARIŞ SIRASI (Referans Alınan Harita)
        const YARIS_PROGRAMI = [
            { brans: "400M KARIŞIK", gun: 1, seans: "1. Gün Sabah" },
            { brans: "100M SERBEST", gun: 1, seans: "1. Gün Sabah" },
            { brans: "50M KELEBEK", gun: 1, seans: "1. Gün Sabah" },
            { brans: "200M KURBAĞALAMA", gun: 1, seans: "1. Gün Sabah" },
            { brans: "400M SERBEST", gun: 1, seans: "1. Gün Sabah" },
            
            { brans: "200M KELEBEK", gun: 1, seans: "1. Gün Akşam" },
            { brans: "50M KURBAĞALAMA", gun: 1, seans: "1. Gün Akşam" },
            { brans: "100M SIRTÜSTÜ", gun: 1, seans: "1. Gün Akşam" },
            { brans: "800M SERBEST", gun: 1, seans: "1. Gün Akşam" },
            
            { brans: "200M KARIŞIK", gun: 2, seans: "2. Gün Sabah" },
            { brans: "50M SIRTÜSTÜ", gun: 2, seans: "2. Gün Sabah" },
            { brans: "200M SERBEST", gun: 2, seans: "2. Gün Sabah" },
            { brans: "100M KURBAĞALAMA", gun: 2, seans: "2. Gün Sabah" },
            
            { brans: "100M KELEBEK", gun: 2, seans: "2. Gün Akşam" },
            { brans: "50M SERBEST", gun: 2, seans: "2. Gün Akşam" },
            { brans: "200M SIRTÜSTÜ", gun: 2, seans: "2. Gün Akşam" },
            { brans: "1500M SERBEST", gun: 2, seans: "2. Gün Akşam" }
        ];

        window.onload = async function() {
            try {
                // 1. Cinsiyet eşleştirmesi için sporcuları çek
                const resSporcular = await fetch(`${API_BASE}/sporcular`);
                const dataSporcular = await resSporcular.json();
                if(dataSporcular.sporcular) {
                    Object.entries(dataSporcular.sporcular).forEach(([id, s]) => {
                        // Türkçe ID temizliği yaparak eşleştirme map'ini oluştur
                        const tr_map = {"Ç":"C","Ğ":"G","I":"I","İ":"I","Ö":"O","Ş":"S","Ü":"U","ç":"c","ğ":"g","ı":"i","i":"i","ö":"o","ş":"s","ü":"u"};
                        let temizId = id.replace(/[ÇĞIİÖŞÜçğıiöşü]/g, m => tr_map[m]).replace(/\s+/g, '_').toUpperCase();
                        cinsiyetHaritasi[temizId] = s.cinsiyet === "Kadın" ? "Kadın" : "Erkek";
                        
                        // Doğum yılını çıkar (Örn: 15.08.2015 -> 2015)
                        let dy = 0;
                        if(s.dogum_tarihi) {
                            let p = s.dogum_tarihi.split("."); dy = parseInt(p[p.length - 1]) || 0;
                        }
                        dogumYiliHaritasi[temizId] = dy;
                    });
                }

                // 2. Tüm yarışları çek
                const resYaris = await fetch(`${API_BASE}/gelecek_yarislar/tum`);
                const dataYaris = await resYaris.json();
                if(dataYaris.yarislar) {
                    tumYarislar = dataYaris.yarislar.map(y => {
                        // ID Eşleştirme ve Cinsiyet Atama
                        const tr_map = {"Ç":"C","Ğ":"G","I":"I","İ":"I","Ö":"O","Ş":"S","Ü":"U","ç":"c","ğ":"g","ı":"i","i":"i","ö":"o","ş":"s","ü":"u"};
                        let hId = (y.Sporcu_ID || "").replace(/[ÇĞIİÖŞÜçğıiöşü]/g, m => tr_map[m]).replace(/\s+/g, '_').toUpperCase();
                        y.Cinsiyet = cinsiyetHaritasi[hId] || "Erkek"; // Varsayılan Erkek (Eşleşmezse)
                        y.Dogum_Yili = dogumYiliHaritasi[hId] || 0;
                        
                        // Eğer profilde doğum yılı yoksa, ID başındaki 16_ gibi ifadeden yılı yakala (Yedek Plan)
                        if(y.Dogum_Yili === 0) {
                            let match = hId.match(/^(\d{2})_/);
                            if(match) y.Dogum_Yili = parseInt("20" + match[1]);
                        }
                        return y;
                    });
                }
                
                gunDegistir(1); // İlk açılışta 1. Günü çiz
            } catch(e) {
                console.error("API Hatası:", e);
                document.getElementById('listeAlani').innerHTML = "<div class='yukleniyor' style='color:red;'>Bağlantı Hatası! Sunucu kapalı olabilir.</div>";
            }
        };

        function gunDegistir(gun) {
            document.querySelectorAll('.sekme-btn').forEach((b, i) => b.className = (i+1 === gun) ? 'sekme-btn aktif' : 'sekme-btn');
            const alan = document.getElementById("listeAlani");
            alan.innerHTML = "";
            
            let oGunProgrami = YARIS_PROGRAMI.filter(p => p.gun === gun);
            let seanslar = [...new Set(oGunProgrami.map(p => p.seans))]; // Sabah, Akşam
            
            seanslar.forEach(seans => {
                let seansDiv = document.createElement('div');
                seansDiv.innerHTML = `<div class="seans-baslik">☀️ ${seans} Seansı</div>`;
                
                let oSeansYarislar = oGunProgrami.filter(p => p.seans === seans);
                oSeansYarislar.forEach(yarisPlani => {
                    // O yarışa giren sporcuları filtrele (Boşluk uyuşmazlıklarına karşı güvenlik kalkanı eklendi)
                    let katilimcilar = tumYarislar.filter(y => {
                        let hBrans = (y.Brans || "").toUpperCase().replace(/\s+/g, " ").trim();
                        let pBrans = (yarisPlani.brans || "").toUpperCase().replace(/\s+/g, " ").trim();
                        return hBrans === pBrans;
                    });
                    
                    if(katilimcilar.length > 0) {
                        // YENİ AKILLI SIRALAMA: Kadın -> Küçük Yaş -> Seri Sırası -> Kulvar Sırası -> İsim
                        katilimcilar.sort((a,b) => {
                            if(a.Cinsiyet !== b.Cinsiyet) return a.Cinsiyet === "Kadın" ? -1 : 1;
                            if(a.Dogum_Yili !== b.Dogum_Yili) return b.Dogum_Yili - a.Dogum_Yili;
                            
                            // Seri numaralarını (Örn: "2. Seri") içinden sayıyı çek, yoksa 999 yap en sona at
                            let seriA = parseInt((a.Seri || "").match(/\d+/)) || 999;
                            let seriB = parseInt((b.Seri || "").match(/\d+/)) || 999;
                            if(seriA !== seriB) return seriA - seriB;
                            
                            // Aynı seridelerse kulvarlarına bak
                            let kulvarA = parseInt((a.Kulvar || "").match(/\d+/)) || 999;
                            let kulvarB = parseInt((b.Kulvar || "").match(/\d+/)) || 999;
                            if(kulvarA !== kulvarB) return kulvarA - kulvarB;

                            return (a.Sporcu_Adi || "").localeCompare(b.Sporcu_Adi || "", 'tr');
                        });

                        let tabloHTML = `<table><thead><tr><th>Sporcu Adı</th><th>Eski Derece</th><th style="text-align:center;">Sonuç (Derece)</th><th style="text-align:center;">İşlem</th></tr></thead><tbody>`;
                        katilimcilar.forEach((k, index) => {
                            let rozet = k.Cinsiyet === "Kadın" ? `<span class="kiz-rozet">Kız</span>` : `<span class="erkek-rozet">Erkek</span>`;
                            let inpId = `snc_${gun}_${index}_${yarisPlani.brans.replace(/\s+/g, '')}`;
                            let startBilgi = (k.Seri && k.Seri !== "-") ? `<div style="font-size: 12px; color: #0d9488; margin-top: 4px; font-weight: 600;">${k.Seri} / ${k.Kulvar}</div>` : '';
                            tabloHTML += `<tr>
                            <td data-label="Sporcu Adı">
                                <a href="sporcu_yonetim.html?id=${k.Sporcu_ID}&kaynak=gyaris" class="isim-link"><strong>${k.Sporcu_Adi}</strong></a> ${rozet}
                                ${startBilgi}
                            </td>
                                <td data-label="Eski Derece" style="color:var(--metin-alt);">${k.Eski_Derece || "-"}</td>
                                <td data-label="Sonuç" style="text-align:center;">
                                    <input type="text" id="${inpId}" class="sonuc-input" value="${k.Hedef || ''}" placeholder="00:00.00">
                                </td>
                                <td data-label="İşlem" style="text-align:center;">
                                    <button class="btn-kaydet" onclick="sonucKaydet(this, '${inpId}', '${k.Sporcu_ID}', '${yarisPlani.brans}')">💾 Kaydet</button>
                                </td>
                            </tr>`;
                        });
                        tabloHTML += `</tbody></table>`;

                        let yarisKutu = document.createElement('div');
                        yarisKutu.className = "yaris-kutu";
                        yarisKutu.innerHTML = `<div class="yaris-baslik">🏊‍♂️ ${yarisPlani.brans}</div>${tabloHTML}`;
                        seansDiv.appendChild(yarisKutu);
                    }
                });
                
                // Eğer o seansta hiç yarışımız (sporcumuz) yoksa ufak bir uyarı
                if(seansDiv.querySelectorAll('.yaris-kutu').length === 0) {
                    seansDiv.innerHTML += `<p style="color:var(--metin-alt); font-size:14px; font-style:italic;">Bu seansta kulübümüze ait yüzecek sporcu bulunmuyor.</p>`;
                }
                
                alan.appendChild(seansDiv);
            });
            
            if(alan.innerHTML === "") {
                alan.innerHTML = "<div class='yukleniyor'>Bu güne ait yarış/sporcu bulunamadı.</div>";
            }
        }

        async function sonucKaydet(btn, inputId, sId, brans) {
            const inp = document.getElementById(inputId);
            const sonuc = inp.value.trim();
            if(!sonuc) return alert("Lütfen geçerli bir derece girin.");
            
            btn.innerText = "⏳..."; btn.style.backgroundColor = "var(--uyari)";
            try {
                const res = await fetch(`${API_BASE}/gelecek_yaris/hedef_kaydet`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ sporcu_id: sId, brans: brans, hedef_derece: sonuc }) });
                const data = await res.json();
                if(res.ok && !data.hata) {
                    btn.innerText = "✅"; btn.style.backgroundColor = "var(--basari)"; inp.style.backgroundColor = "#ecfdf5"; inp.style.borderColor = "var(--basari)";
                    setTimeout(() => { btn.innerText = "💾 Kaydet"; btn.style.backgroundColor = "var(--mavi)"; }, 2000);
                } else { alert("Hata: " + (data.hata || "Bilinmeyen Hata")); btn.innerText = "💾 Kaydet"; btn.style.backgroundColor = "var(--mavi)";}
            } catch(e) {
                alert("Bağlantı Hatası"); btn.innerText = "💾 Kaydet"; btn.style.backgroundColor = "var(--mavi)";
            }
        }

        // YENİ EKLENEN PDF YÜKLEME FONKSİYONU
        async function pdfYukle(event) {
            const dosya = event.target.files[0];
            if(!dosya) return;
            
            if(!confirm("⚠️ DİKKAT: Yeni bir yarış PDF'i yüklediğinizde, sistemdeki ESKİ yarış verileri tamamen SİLİNİR ve yenileri üzerine yazılır.\n\nİşleme devam etmek istiyor musunuz?")) {
                event.target.value = ""; // Aynı dosyayı tekrar seçebilmek için inputu sıfırla
                return;
            }

            document.getElementById('yuklemeBaslik').innerText = "PDF Okunuyor ve Eşleştiriliyor...";
            document.getElementById('yuklemeAciklama').innerText = "Lütfen bekleyin, tablo ayrıştırılıp Google Sheets'e yazılıyor.";
            document.getElementById('pdfYuklemeEkrani').style.display = 'flex';
            
            const formData = new FormData();
            formData.append("file", dosya);
            
            try {
                const res = await fetch(`${API_BASE}/gelecek_yaris/pdf_yukle`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if(res.ok && !data.hata) {
                    alert("✅ " + data.mesaj);
                    window.location.reload(); // Yükleme başarılıysa sayfayı yenile ve verileri getir
                } else { 
                    // Sunucu kütüphane eksikliği vb. yapısal bir hata (detail) dönerse onu da yakala
                    let detayliHata = data.hata || (data.detail ? "Sistem Hatası (python-multipart kütüphanesi eksik olabilir): " + JSON.stringify(data.detail) : "Bilinmeyen hata.");
                    alert("❌ Hata: " + detayliHata); 
                }
            } catch(e) {
                alert("⚠️ Sunucu bağlantı hatası!");
            } finally {
                document.getElementById('pdfYuklemeEkrani').style.display = 'none';
                event.target.value = ""; // Aynı dosyayı tekrar seçebilmek için inputu sıfırla
            }
        }

        // YENİ EKLENEN START LİSTESİ ÇEKME FONKSİYONU
        async function startListesiCek() {
            if(!confirm("⚠️ DİKKAT: Yeni bir Start Listesi çektiğinizde, listedeki mevcut seri ve kulvar bilgileri yenileriyle değiştirilecektir.\n\nİşleme devam etmek istiyor musunuz?")) {
                return;
            }

            let cevap = prompt("Yarışın klasör numarasını (Örn: 29) veya tam adresini girin:\n(Bu işlem o sayfadaki tüm Start Listelerini okuyup kulübümüzün sporcularıyla otomatik eşleştirir)");
            if(!cevap || cevap.trim() === "") return;

            document.getElementById('yuklemeBaslik').innerText = "Start Listeleri Taranıyor 🚦";
            document.getElementById('yuklemeAciklama').innerText = "Web sitesindeki PDF'ler indirilip okunuyor ve sporcularımızın eşleşmeleri yapılıyor. Bu işlem 10-20 saniye sürebilir, lütfen bekleyin...";
            document.getElementById('pdfYuklemeEkrani').style.display = 'flex';

            try {
                const res = await fetch(`${API_BASE}/gelecek_yaris/start_listesi_cek`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url_veya_no: cevap })
                });
                const data = await res.json();
                
                if(res.ok && !data.hata) {
                    alert("✅ " + data.mesaj);
                    window.location.reload(); 
                } else { 
                    alert("❌ Hata: " + (data.hata || "Bilinmeyen hata.")); 
                }
            } catch(e) {
                alert("⚠️ Sunucu bağlantı hatası!");
            } finally {
                document.getElementById('pdfYuklemeEkrani').style.display = 'none';
            }
        }
    </script>
</body>
</html>
