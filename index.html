<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabzon Büyükşehir Belediye Spor Kulübü | Yükleniyor...</title>
    <style>
        /* --- BEYAZ / AYDINLIK TEMA --- */
        :root {
            --arkaplan: #f0f2f5;
            --kart-bg: #ffffff;
            --bordo: #9f1239;
            --mavi: #0284c7;
            --metin-ana: #1e293b;
            --metin-alt: #64748b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--arkaplan);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* LOGO VE BAŞLIK */
        .logo-img {
            max-width: 234px;
            margin-bottom: 20px;
            /* Beyaz arka planı yok edip sayfaya yediren sihirli kod: */
            mix-blend-mode: multiply;
            /* Kutu görünümü veren gölge ve kenarlıkları tamamen kaldırdık */
            box-shadow: none;
            border-radius: 0;
        }


        h1 {
            color: var(--bordo);
            font-size: 32px;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 900;
            max-width: 800px;
        }

        /* GİRİŞ BUTONU */
        .btn-giris {
            background-color: var(--bordo);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(159, 18, 57, 0.3);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            animation: belirmeye 1s forwards;
        }

        .btn-giris:hover {
            background-color: #be123c;
            transform: translateY(-3px) scale(1.05);
        }

        @keyframes belirmeye {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #kurButonuKutusu {
            margin-top: 20px;
            background-color: #9f1239;
            /* Bordo */
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: none;
            /* İlk başta gizli, telefon uygunsa açılacak */
            z-index: 9999;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            animation: asagidanGel 0.5s ease-out;
        }

        @keyframes asagidanGel {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* --- MOBİL UYUMLULUK (RESPONSIVE) --- */
        @media (max-width: 768px) {
            .logo-img {
                max-width: 150px;
                margin-bottom: 15px;
            }
            h1 {
            font-size: 24px;
                margin-bottom: 10px;
            }
        }
    </style>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0284c7">
    <link rel="apple-touch-icon" href="logo_maskable.png">

</head>

<body>

    <img src="logo.png" alt="Kulüp Logosu" class="logo-img" onerror="this.style.display='none'">

    <h1>Trabzon Büyükşehir Belediye Spor Kulübü</h1>

    <p style="color: var(--metin-alt); font-size: 16px; margin-bottom: 30px; max-width: 600px; line-height: 1.5;">Hızlı Erişim ve Sıfır Bekleme Süresi ile Kulüp İşletim Sistemi.</p>

    <a href="menu.html" class="btn-giris" id="girisButonu" style="display: inline-block;">🚀 Sisteme Giriş Yap</a>

    <div id="kurButonuKutusu" onclick="uygulamayiKur()">
        📲 Uygulamayı Telefona Kur
    </div>

    <div style="margin-top: 30px; font-size: 13px; color: var(--metin-alt); font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 5px;">
        <span>Sistem Sürümü: v10.0</span>
        <span style="font-size: 10px; font-weight: normal; opacity: 0.8;">Canlı ve güncel verilerle çalışıyor</span>
    </div>

    <script>
        let deferredPrompt;
        const kurButonu = document.getElementById('kurButonuKutusu');

        // Service Worker'ı sisteme kaydet
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("🚀 Service Worker aktif!");
            });
        }

        // Cihaz PWA kurulumunu destekliyorsa bu olay tetiklenir
        window.addEventListener('beforeinstallprompt', (e) => {
            // Chrome'un kendi çirkin kurulum ekranını durdur
            e.preventDefault();
            deferredPrompt = e;

            // Bizim o şık bordo butonumuzu göster
            kurButonu.style.display = 'block';

            // TAM İSTEDİĞİN GİBİ: 10 Saniye sonra kullanıcıyı darlamamak için gizle
            setTimeout(() => {
                kurButonu.style.display = 'none';
            }, 10000);
        });

        async function uygulamayiKur() {
            if (deferredPrompt) {
                // Kurulum ekranını tetikle
                deferredPrompt.prompt();
                // Kullanıcının kararını bekle
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('✅ Patron, uygulama başarıyla telefona kuruldu!');
                }
                deferredPrompt = null;
                // Kurulum bittikten sonra butonu yok et
                kurButonu.style.display = 'none';
            }
        }

        // Arka planda Render sunucusunu (Python) sessizce uyandır
        fetch("https://trabzon-yuzme-api.onrender.com/api/ping").catch(() => {});

    </script>
</body>

</html>
